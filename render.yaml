services:
  - type: web
    name: lcs-treasury-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py fix_sequences"
    startCommand: "gunicorn config.wsgi:application --workers 1 --timeout 120"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
